services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-findocint}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-findocint}
      POSTGRES_DB: ${POSTGRES_DB:-findocint}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-findocint}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ../backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-findocint}:${POSTGRES_PASSWORD:-findocint}@postgres:5432/${POSTGRES_DB:-findocint}
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../backend/app:/app/app

volumes:
  postgres_data:
